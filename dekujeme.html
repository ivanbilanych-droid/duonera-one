<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="8;url=https://duonera.cz/">
  <title>Děkujeme — DUONERA</title>
  <link rel="stylesheet" href="styles.css?v=3">
  <style>
    body.thank-you-page{min-height:100vh;background:#090908;color:#f7f0df;display:grid;place-items:center;margin:0;padding:24px;font-family:Arial,Helvetica,sans-serif}
    .thank-you-card{width:min(760px,100%);position:relative;overflow:hidden;border:1px solid rgba(221,177,76,.45);background:linear-gradient(145deg,rgba(25,22,17,.98),rgba(8,8,7,.98));box-shadow:0 28px 90px rgba(0,0,0,.55);padding:64px 54px;text-align:center}
    .thank-you-card:before,.thank-you-card:after{content:"";position:absolute;border-radius:50%;filter:blur(2px);opacity:.45;pointer-events:none}
    .thank-you-card:before{width:280px;height:280px;right:-150px;top:-160px;background:radial-gradient(circle,rgba(221,177,76,.28),transparent 68%)}
    .thank-you-card:after{width:220px;height:220px;left:-120px;bottom:-130px;background:radial-gradient(circle,rgba(221,177,76,.17),transparent 68%)}
    .thank-you-logo{font-family:Georgia,'Times New Roman',serif;font-size:34px;letter-spacing:.12em;color:#e7c46b;margin-bottom:6px}
    .thank-you-sub{font-size:10px;letter-spacing:.26em;color:#b99a53;margin-bottom:48px}
    .thank-you-symbol{width:68px;height:68px;border:1px solid #d8b052;border-radius:50%;display:grid;place-items:center;margin:0 auto 28px;color:#e6c56e;font-size:29px;background:rgba(221,177,76,.07)}
    .thank-you-card h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(36px,6vw,64px);line-height:1.05;margin:0 0 20px;font-weight:400;color:#fff}
    .thank-you-card p{font-size:18px;line-height:1.65;color:#d8d0c0;max-width:560px;margin:0 auto 32px}
    .thank-you-note{font-size:13px!important;color:#aa9d85!important;margin-top:22px!important}
    .thank-you-button{display:inline-flex;justify-content:center;align-items:center;min-height:52px;padding:0 30px;border:1px solid #d8b052;background:linear-gradient(135deg,#f0d17b,#c4932f);color:#111;text-decoration:none;font-weight:700;letter-spacing:.02em;box-shadow:0 12px 28px rgba(194,147,47,.2)}
    .thank-you-button:hover{filter:brightness(1.06)}
    @media(max-width:600px){.thank-you-card{padding:48px 24px}.thank-you-card p{font-size:16px}.thank-you-sub{margin-bottom:36px}}
  </style>
</head>
<body class="thank-you-page">
  <main class="thank-you-card">
    <div class="thank-you-logo">♛ DUONERA</div>
    <div class="thank-you-sub">PRIVATE DATING CONCIERGE</div>
    <div class="thank-you-symbol">✓</div>
    <h1>Děkujeme za registraci.</h1>
    <p>Vaše údaje byly bezpečně odeslány. Až spustíme další část DUONERA, ozveme se vám s informacemi k vytvoření úplného profilu.</p>
    <a class="thank-you-button" href="https://duonera.cz/">Zpět na hlavní stránku</a>
    <p class="thank-you-note">Na hlavní stránku vás vrátíme automaticky za několik sekund.</p>
  </main>
</body>
</html>
